<h1>{{ contexto.vendedor.nome }}</h1>
<p>{{ contexto.vendedor.descricao }}</p>


{% if contexto.lista_de_artigos %}
    <ul>
    {% for artigo in contexto.lista_de_artigos %}
        <li><a href="{% url 'loja:artigo' artigo.id %}">{{ artigo.nome }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>Não há artigos.</p>
{% endif %}
